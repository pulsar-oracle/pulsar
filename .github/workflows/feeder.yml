name: Feeder CI

on:
  push:
    branches: [main]
    paths: ["feeder/**"]
  pull_request:
    paths: ["feeder/**"]

jobs:
  build:
    name: Build & Type Check Feeder
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: feeder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: feeder/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
